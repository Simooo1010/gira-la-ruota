<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#8A2BE2" stroke-width="20" opacity="0.8" />
  <circle cx="256" cy="256" r="230" fill="none" stroke="#0052FF" stroke-width="10" />
  
  <!-- Wheel segments -->
  <g transform="rotate(22.5, 256, 256)">
    <!-- Segment 1 -->
    <path d="M256,256 L256,36 A220,220 0 0,1 411,100 Z" fill="#0052FF" />
    <!-- Segment 2 -->
    <path d="M256,256 L411,100 A220,220 0 0,1 476,256 Z" fill="#8A2BE2" />
    <!-- Segment 3 -->
    <path d="M256,256 L476,256 A220,220 0 0,1 411,412 Z" fill="#FFD700" />
    <!-- Segment 4 -->
    <path d="M256,256 L411,412 A220,220 0 0,1 256,476 Z" fill="#22C55E" />
    <!-- Segment 5 -->
    <path d="M256,256 L256,476 A220,220 0 0,1 101,412 Z" fill="#0052FF" />
    <!-- Segment 6 -->
    <path d="M256,256 L101,412 A220,220 0 0,1 36,256 Z" fill="#8A2BE2" />
    <!-- Segment 7 -->
    <path d="M256,256 L36,256 A220,220 0 0,1 101,100 Z" fill="#FFD700" />
    <!-- Segment 8 -->
    <path d="M256,256 L101,100 A220,220 0 0,1 256,36 Z" fill="#22C55E" />
  </g>
  
  <!-- Inner hub -->
  <circle cx="256" cy="256" r="60" fill="#121214" stroke="#ffffff" stroke-width="8" />
  <circle cx="256" cy="256" r="30" fill="#8A2BE2" />
  
  <!-- Pointer at the top -->
  <polygon points="256,66 236,16 276,16" fill="#FFD700" stroke="#ffffff" stroke-width="4" />
</svg>